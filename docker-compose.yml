# ──────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT — builds images from source with hot-reload-friendly setup
# Usage: docker compose up --build
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: neural_archaeologist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port 5432 is NOT exposed to host — backend connects via Docker network
    # Uncomment below if you need to inspect the DB directly from host
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file:
      - ./backend/.env          # your local backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/neural_archaeologist
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
        VITE_SOCKET_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
