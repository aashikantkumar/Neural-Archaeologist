# ──────────────────────────────────────────────────────────────────────────────
# PRODUCTION — used on the AWS EC2 instance
# 
# Before first run:
#   1. cp .env.prod.example .env.prod  and fill in real values
#   2. Run:  bash scripts/init-letsencrypt.sh
#   3. Then: docker compose -f docker-compose.prod.yml up -d
#
# To redeploy after code changes:
#   bash scripts/deploy.sh
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL (omit this if you use AWS RDS — see DEPLOY_AWS.md) ────────────
  db:
    image: postgres:15-alpine
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neural_archaeologist}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file: .env.prod
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://${DOMAIN_NAME}
        VITE_SOCKET_URL: https://${DOMAIN_NAME}
    restart: unless-stopped
    networks:
      - app_network

  # ── Nginx Edge Proxy (SSL termination + routing) ─────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app_network

  # ── Certbot (auto-renews SSL every 12 h) ────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renew certs daily (certbot only acts when < 30 days remain)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:

networks:
  app_network:
    driver: bridge
