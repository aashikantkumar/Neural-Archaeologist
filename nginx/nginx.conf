# ──────────────────────────────────────────────────────────────────────────────
# Nginx edge proxy — handles SSL termination, routing, and Let's Encrypt renewal
#
# Replace YOUR_DOMAIN with your actual domain, e.g. neural-archaeologist.com
# This file is volume-mounted into the nginx container at runtime.
# ──────────────────────────────────────────────────────────────────────────────

# ── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name neural-archaeologist.duckdns.org;

    # Required for Let's Encrypt ACME HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name neural-archaeologist.duckdns.org;

    # SSL certificates managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/neural-archaeologist.duckdns.org-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neural-archaeologist.duckdns.org-0001/privkey.pem;

    # Modern SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Max upload size (for repo analysis)
    client_max_body_size 50M;

    # ── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket / Socket.IO ────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ── Backend health (direct passthrough) ─────────────────────────────────
    location /health {
        proxy_pass http://backend:8000;
    }

    # ── FastAPI docs (remove in production if not needed) ───────────────────
    location /docs {
        proxy_pass http://backend:8000;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
    }

    # ── React frontend (everything else) ────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
