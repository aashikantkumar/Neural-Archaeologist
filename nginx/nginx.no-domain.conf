# ──────────────────────────────────────────────────────────────────────────────
# Nginx config — HTTP only (no custom domain, no SSL)
# Use this when deploying on EC2 with just the free public DNS hostname.
#
# Your app will be accessible at:
#   http://ec2-xx-xx-xx-xx.compute-1.amazonaws.com
#   http://YOUR_ELASTIC_IP
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;   # Accept requests from any hostname / IP

    # Max upload size (for repo analysis)
    client_max_body_size 50M;

    # ── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket / Socket.IO ────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ── Backend health ───────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8000;
    }

    # ── FastAPI docs ─────────────────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend:8000;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
    }

    # ── React frontend (everything else) ────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
