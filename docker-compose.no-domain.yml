# ──────────────────────────────────────────────────────────────────────────────
# PRODUCTION — No custom domain / HTTP only
#
# Use this when you don't have a domain and want to access via:
#   http://YOUR_ELASTIC_IP  or  http://ec2-xx-xx-xx-xx.compute-1.amazonaws.com
#
# Before first run:
#   1. cp .env.no-domain.example .env.prod  and fill in real values
#   2. docker compose -f docker-compose.no-domain.yml up -d --build
#
# To redeploy after code changes:
#   docker compose -f docker-compose.no-domain.yml up -d --build --no-deps backend frontend
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file: .env.prod
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Use http:// (no SSL) + your EC2 public DNS or Elastic IP
        VITE_API_URL: http://${EC2_HOST}
        VITE_SOCKET_URL: http://${EC2_HOST}
    restart: unless-stopped
    networks:
      - app_network

  # ── Nginx (HTTP only — no SSL, no certbot) ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.no-domain.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
